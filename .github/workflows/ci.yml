name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Restringe o GITHUB_TOKEN automatico do runner ao mínimo necessário.
# Evita que credenciais com permissões mais amplas sejam expostas em
# mensagens de erro de ferramentas como Composer (que já vazou ghs_*
# token completo no log do run 25770737716 — corrigido nesse workflow).
permissions:
  contents: read

jobs:
  tests:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, openssl, libxml, zlib, mbstring, gd
          coverage: none
          tools: composer:v2

      # Remove TUDO que setup-php deixou em auth.json + global config.
      # Causa do bug: setup-php@v2 escreve o GITHUB_TOKEN auto-injetado
      # como github-oauth no auth.json global. O token novo é JWT-formatado
      # (`ghs_<id>_<base64-jwt>`), Composer rejeita formato com regex
      # antigo e PRINTA o token inteiro na mensagem de erro.
      # Histórico de leaks: runs 25770737716, 25779676388, e o mais
      # recente — todos deletados.
      - name: Limpar tokens GitHub do Composer
        run: |
          composer config --global --unset github-oauth.github.com 2>/dev/null || true
          composer config --global --unset http-basic.github.com 2>/dev/null || true
          rm -f ~/.composer/auth.json ~/.config/composer/auth.json 2>/dev/null || true
          mkdir -p ~/.config/composer
          echo '{}' > ~/.config/composer/auth.json

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        env:
          COMPOSER_AUTH: '{}'
          COMPOSER_TOKEN: ''
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPUnit
        run: vendor/bin/phpunit --no-coverage

  static-analysis:
    name: PHPStan (level 8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, openssl, libxml, zlib, mbstring, gd
          coverage: none
          tools: composer:v2

      - name: Limpar tokens GitHub do Composer
        run: |
          composer config --global --unset github-oauth.github.com 2>/dev/null || true
          composer config --global --unset http-basic.github.com 2>/dev/null || true
          rm -f ~/.composer/auth.json ~/.config/composer/auth.json 2>/dev/null || true
          mkdir -p ~/.config/composer
          echo '{}' > ~/.config/composer/auth.json

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-stan-${{ hashFiles('composer.json') }}
          restore-keys: composer-stan-

      - name: Install dependencies
        env:
          COMPOSER_AUTH: '{}'
          COMPOSER_TOKEN: ''
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M --no-progress
