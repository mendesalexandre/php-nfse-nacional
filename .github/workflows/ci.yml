name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Restringe o GITHUB_TOKEN automatico do runner ao mínimo necessário.
# Evita que credenciais com permissões mais amplas sejam expostas em
# mensagens de erro de ferramentas como Composer (que já vazou ghs_*
# token completo no log do run 25770737716 — corrigido nesse workflow).
permissions:
  contents: read

jobs:
  tests:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, openssl, libxml, zlib, mbstring, gd
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        # Limpa COMPOSER_AUTH pra impedir Composer de tentar autenticar
        # contra GitHub (todas nossas deps são públicas no Packagist).
        # Em PHP 8.3 a versão de Composer instalada rejeitava o
        # JWT-formatted GHS token e printava ele inteiro na mensagem
        # de erro — mesmo set vazio aqui evita o caminho problemático.
        env:
          COMPOSER_AUTH: '{}'
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPUnit
        run: vendor/bin/phpunit --no-coverage

  static-analysis:
    name: PHPStan (level 8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, openssl, libxml, zlib, mbstring, gd
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-stan-${{ hashFiles('composer.json') }}
          restore-keys: composer-stan-

      - name: Install dependencies
        env:
          COMPOSER_AUTH: '{}'
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M --no-progress
