name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Princípio do menor privilégio. Mesmo com Composer 2.9.8+ (fix do
# GHSA-f9f8-rm49-7jv2), restringir o GITHUB_TOKEN reduz blast radius
# se outra ferramenta vazar credenciais em log.
permissions:
  contents: read

jobs:
  tests:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, openssl, libxml, zlib, mbstring, gd
          coverage: none
          # Pin >=2.9.8 garante fix do GHSA-f9f8-rm49-7jv2 (token leak via
          # validação regex de github-oauth). Era 2.8.10 antes do advisory.
          tools: composer:v2.9

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        # Defesa em profundidade: nossas deps são públicas no Packagist,
        # não precisamos autenticar contra GitHub. COMPOSER_AUTH={} bloqueia
        # qualquer token que setup-php tentaria injetar.
        env:
          COMPOSER_AUTH: '{}'
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPUnit
        run: vendor/bin/phpunit --no-coverage

  static-analysis:
    name: PHPStan (level 8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, openssl, libxml, zlib, mbstring, gd
          coverage: none
          tools: composer:v2.9

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-stan-${{ hashFiles('composer.json') }}
          restore-keys: composer-stan-

      - name: Install dependencies
        env:
          COMPOSER_AUTH: '{}'
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M --no-progress
